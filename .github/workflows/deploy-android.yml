name: Déploiement Android (Play Store)

# Déclenché en poussant un tag de version (ex: v1.0.0) ou manuellement.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Piste Play Store"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

env:
  FLUTTER_VERSION: "3.44.7"
  JAVA_VERSION: "17"

jobs:
  deploy:
    name: Build & upload AAB signé
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restauration du keystore release
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keneya-release.jks

      - name: Écriture de key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keneya-release.jks
          EOF

      - name: Restauration du compte de service Google Play
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > android/fastlane/play-service-account.json
          # Validation immédiate (sans divulguer le contenu du secret)
          if python3 -c "import json,sys; json.load(open('android/fastlane/play-service-account.json'))" 2>/dev/null; then
            echo "✅ Compte de service : JSON valide"
          else
            echo "::error::Le secret PLAY_SERVICE_ACCOUNT_JSON n'est pas un JSON valide."
            echo "Taille du fichier écrit : $(wc -c < android/fastlane/play-service-account.json) octets"
            echo "1re ligne (masquée) : $(head -c 30 android/fastlane/play-service-account.json | tr -d '\n')..."
            exit 1
          fi

      - name: Dépendances Flutter
        run: flutter pub get

      - name: Build App Bundle release
        run: flutter build appbundle --release

      - name: Setup Ruby / fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: android

      - name: Upload vers le Play Store (piste de test fermé, brouillon)
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: fastlane/play-service-account.json
        run: bundle exec fastlane closed

      - name: Nettoyage des secrets
        if: always()
        run: rm -f android/app/keneya-release.jks android/key.properties android/fastlane/play-service-account.json
